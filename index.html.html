<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER</title>
    <link rel="stylesheet" href="weather.css">
    <script src="weather.js" defer></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
    <main class="mainContainer">
        <header class="input-container">
            <input class="city-Input" placeholder="Search City" type="text">
            <button class="search-btn">
                <span class="material-symbols-outlined">
                 search
                </span>
            </button>
        </header>
        <section class="weather-info" style="display: none;">
            <div class="location-date-container">
                <div class="location">
                    <span class="material-symbols-outlined">
                     location_on
                    </span>
                    <h4 class="country-txt">India</h4>
                </div>
                <h5 class="current-date-txt regular-txt">Mon, 13 April</h5>
            </div>
            <div class="weather-summary-container">
                <img src="assets/clouds.svg" class="weather-summary-img">
                <div class="weather-summary-info">
                    <h1 class="temp-txt">29 ℃</h1>
                    <h3 class="condition-txt regular-txt">Clouds</h3>
                </div>
            </div>
            <div class="weather-conditions-container">
                <div class="conditions-items">
                    <span class="material-symbols-outlined">
                     water_drop
                    </span>
                
                <div class="conditions-info">
                    <h5 class="regular-txt">Humidity</h5>
                    <h5 class="humidity-txt-val">55%</h5>
                </div>
            </div>
                <div class="conditions-items">
                    <span class="material-symbols-outlined">
                     air
                    </span>
                <div class="conditions-info">
                    <h5 class="regular-txt">Wind Speed</h5>
                    <h5 class="wind-txt-val">2 m/s</h5>
                </div>
                </div>
            </div>
            <div class="forecast-item-container">
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">11 April</h5>
                    <img src="assets/thunderstorm.svg" alt="thunder" class="forecast-item-img">
                    <h5 class="forecast-item-temperature">29 ℃</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">11 April</h5>
                    <img src="assets/thunderstorm.svg" alt="thunder" class="forecast-item-img">
                    <h5 class="forecast-item-temperature">29 ℃</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">11 April</h5>
                    <img src="assets/thunderstorm.svg" alt="thunder" class="forecast-item-img">
                    <h5 class="forecast-item-temperature">29 ℃</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">11 April</h5>
                    <img src="assets/thunderstorm.svg" alt="thunder" class="forecast-item-img">
                    <h5 class="forecast-item-temperature">29 ℃</h5>
                </div>
            </div>
        </section>
        <section class="search-city section-message">
            <img src="assets/message/search-city.png" alt="search city">
            <h1>Search City</h1>
            <h4 class="regular-txt">
                Find out the weather conditions of your city
            </h4>
        </section>

        <section class="not-found section-message" style="display:none;">
            <img src="assets/message/not-found.png" alt="search city">
            <h1>Search City</h1>
            <h4 class="regular-txt">
                Find out the weather conditions of your city
            </h4>
        </section>
    </main>
</body>
</html>
